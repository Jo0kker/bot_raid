services:
  postgres:
    image: postgres:16-alpine
    container_name: gw-events-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gw_events
      POSTGRES_USER: gw_events
      POSTGRES_PASSWORD: gw_events_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gw_events -d gw_events"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
